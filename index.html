<!DOCTYPE html>
  <html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Timer</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f4eb;
        --case: #fffdf4;
        --case-edge: #111111;
        --ink: #050505;
        --muted: #2d2d2d;
        --red: #d71920;
        --button: #070707;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 7%, #fffef8 0, var(--paper) 44%, #e9dfc8 100%);
      }

      main {
        display: grid;
        gap: 18px;
        align-content: start;
        justify-items: center;
        min-height: 100vh;
        padding: 22px 20px 24px;
      }

      .timer-shell {
        position: relative;
        width: min(86vw, 392px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          linear-gradient(145deg, #ffffff 0%, var(--case) 58%, #f1e8d2 100%);
        border: 5px solid #111111;
        box-shadow:
          0 24px 0 #111111,
          0 34px 42px rgba(0, 0, 0, 0.22),
          inset 0 4px 0 rgba(255, 255, 255, 0.95);
        display: grid;
        place-items: center;
      }

      .timer-shell::after {
        content: "";
        position: absolute;
        inset: 18px;
        border-radius: 50%;
        border: 3px solid var(--case-edge);
        pointer-events: none;
      }

      canvas {
        position: relative;
        z-index: 1;
        display: block;
        width: calc(100% - 46px);
        height: calc(100% - 46px);
        border-radius: 50%;
        background: #fffef6;
      }

      .readout {
        display: grid;
        justify-items: center;
        gap: 4px;
      }

      #timeText {
        font-size: clamp(34px, 9vw, 48px);
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      #statusText {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .controls,
      .settings {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      button {
        min-width: 92px;
        padding: 11px 16px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--button);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: var(--ink);
        border-color: #111111;
      }

      button:disabled {
        cursor: default;
        opacity: 0.45;
      }

      button:not(:disabled):hover {
        filter: brightness(0.94);
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      input[type="color"] {
        width: 42px;
        height: 32px;
        margin-left: 8px;
        padding: 2px;
        vertical-align: middle;
        border: 1px solid #c9c5bd;
        border-radius: 8px;
        background: #fff;
      }

      .hint {
        max-width: 330px;
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="timer-shell" aria-label="Analog countdown dial">
        <canvas id="timerCanvas" width="690" height="690"></canvas>
      </div>
      <div class="readout" aria-live="polite">
        <div id="timeText">0:00</div>
        <div id="statusText">Set timer</div>
      </div>
      <div class="controls">
        <button id="startButton" type="button">Start</button>
        <button id="pauseButton" class="secondary" type="button">Pause</button>
        <button id="resetButton" class="secondary" type="button">Reset</button>
      </div>
      <div class="settings">
        <label>Disk color <input type="color" id="colorPicker" value="#d71920"></label>
      </div>
      <p class="hint">Drag the edge of the red disk to set up to 60 minutes.</p>
    </main>
    <audio id="ding" src="ding.mp3" preload="auto"></audio>
    <script src="renderer.js"></script>
  </body>
  </html>
